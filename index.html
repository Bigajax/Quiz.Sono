<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocolo Sono · Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="quiz-shell" aria-live="polite">
      <div class="noise"></div>
      <header class="brand-header">
        <div class="brand-row">
          <button class="back-button" id="backButton" type="button" aria-label="Voltar" hidden>←</button>
          <div class="ecotopia-logo" aria-label="Ecotopia">
            <img src="logo%20(2).png" alt="Ecotopia" />
          </div>
          <span></span>
        </div>
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </header>

      <section class="quiz-stage" id="quizStage"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
